<!DOCTYPE html>
<html lang="{{ language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portfolio{% endblock %}</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: #333;
        }

        nav {
            background-color: #2c3e50;
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        nav li {
            margin: 0;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 0.75rem;
            border-radius: 4px;
            transition: background-color 0.3s;
            display: inline-block;
            font-size: 14px;
        }

        nav a:hover {
            background-color: #34495e;
        }

        .lang-switcher {
            display: flex;
            gap: 0.25rem;
            justify-content: center;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        .lang-switcher a {
            padding: 0.4rem 0.6rem;
            font-size: 12px;
            font-weight: bold;
            background-color: #34495e;
        }

        .lang-switcher a:hover {
            background-color: #1abc9c;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            nav {
                padding: 0.75rem;
            }

            nav ul {
                gap: 0.25rem;
            }

            nav a {
                padding: 0.4rem 0.5rem;
                font-size: 12px;
            }

            .lang-switcher {
                margin-top: 0.5rem;
            }

            .container {
                padding: 1rem;
            }
        }

        @media (max-width: 480px) {
            nav {
                padding: 0.5rem;
            }

            nav ul {
                gap: 0.15rem;
            }

            nav li {
                flex: 0 0 calc(50% - 0.1rem);
            }

            nav a {
                padding: 0.35rem 0.4rem;
                font-size: 11px;
                width: 100%;
                text-align: center;
            }

            .lang-switcher {
                margin-top: 0.5rem;
                justify-content: center;
            }

            .lang-switcher a {
                padding: 0.35rem 0.5rem;
                font-size: 11px;
            }

            .container {
                padding: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/projects">Projects</a></li>
            <li><a href="/contact">Contact</a></li>
            <li><a href="/voice-api">Voice API</a></li>
        </ul>
        <div class="lang-switcher">
            <a href="?lang=en" style="{% if language == 'en' %}background-color: #3498db;{% endif %}">EN</a>
            <a href="?lang=ko" style="{% if language == 'ko' %}background-color: #3498db;{% endif %}">KO</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; {{ trans.footer }}</p>
    </footer>
</body>
</html>
