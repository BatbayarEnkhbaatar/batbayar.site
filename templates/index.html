{% extends "base.html" %}

{% block title %}{{ trans.home.title }} - Portfolio{% endblock %}

{% block content %}
<section style="text-align: center; padding: 4rem 0;">
    <h1>{{ trans.home.welcome }}</h1>
    <p style="font-size: 1.2rem; color: #666;">{{ trans.home.intro }} - {{ trans.home.description }}</p>
    <img src="https://images.unsplash.com/photo-1517077304055-6e89abbf09b0?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="Portfolio hero image" style="max-width: 100%; border-radius: 8px; margin-top: 2rem;">
</section>

<section style="margin-top: 3rem;">
    <h2>{{ trans.about.about_me }}</h2>
    <p>{{ trans.about.bio }}</p>
    <a href="/about" style="display: inline-block; background-color: #3498db; color: white; padding: 0.5rem 1rem; text-decoration: none; border-radius: 4px;">{{ trans.home.cta }}</a>
</section>
{% endblock %}
